<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Control de Pedidos</title>
    <link rel="stylesheet" href="css/estilo.css">
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-6KE4VFD3FG"></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());

          gtag('config', 'G-6KE4VFD3FG');
        </script>
</head>
<body>

<div class="contenedor">
    <div class="caja">
        <div class="pestañas">
            <button class="tab-boton" id="login-tab" onclick="showForm('login')">Iniciar Sesión</button>
            <button class="tab-boton" id="register-tab" onclick="showForm('register')">Registrarse</button>
        </div> 

        <div class="forma-contenedor" id="login-form">
            <div class="logo">Control de Pedidos</div>
            <h2>Bienvenido</h2>
            <form action="php/login.php" method="post">
                
                <input type="email" name="correo" placeholder="Correo electrónico" required>
                <input type="password" name="contraseña" placeholder="Contraseña" required>
                <button type="submit">Entrar</button>
            </form>
            <p>¿No tienes una cuenta? <a href="javascript:void(0)" onclick="showForm('register')">Regístrate aquí</a></p>
        </div>

        <div class="forma-contenedor" id="register-form" style="display: none;">
            <div class="logo">Control de Pedidos</div>
            <h2>Crear Cuenta</h2>
            <form action="php/guardar-login.php" method="POST">
                <input type="text" name="nombre" placeholder="Nombre completo" required>
                <input type="email" name="correo" placeholder="Correo electrónico" required>
                <input type="password" name="contraseña" placeholder="Contraseña" required>
                <button type="submit">Registrarse</button>
            </form>
            <p>¿Ya tienes cuenta? <a href="javascript:void(0);" onclick="showForm('login')">Iniciar sesión</a></p>
        </div>
    </div>
</div>
<script>
    function showForm(formType) {
        if (formType === 'login') {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-tab').classList.add('active');
            document.getElementById('register-tab').classList.remove('active');
        } else if (formType === 'register') {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
            document.getElementById('register-tab').classList.add('active');
            document.getElementById('login-tab').classList.remove('active');
        }
    }
    window.onload = function() {
        showForm('login');
    }
</script>
</body>
</html>
